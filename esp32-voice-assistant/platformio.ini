; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = main

[env:esp32s3box]
platform = espressif32
board = esp32s3box
framework = espidf

; Monitor settings
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Build flags para ESP32-S3-BOX-3 con BSP
build_flags = 
    -DBOARD_HAS_PSRAM
    -DCONFIG_BSP_BOARD_ESP32_S3_BOX_3=1
    -DLVGL_BUFFER_HEIGHT=30
    -Wno-error

; Configuraciones críticas para ESP-IDF
board_build.flash_mode = dio
board_build.partitions = partitions.csv
board_build.psram_mode = octal
board_build.arduino.memory_type = qio_opi

; Custom sdkconfig para audio y WiFi
board_build.esp-idf.sdkconfig_path = sdkconfig.esp32s3box

; Componentes extras de ESP-IDF (BSP se agregará vía idf_component.yml)
; El BSP se descargará automáticamente al compilar
